<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Jamia-Tun-Noor</title>

    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/style.css">

    <style>
        .dashboard-wrapper {
            padding: var(--space-12) var(--gutter);
            max-width: var(--container-max);
            margin: 0 auto;
        }

        /* Dashboard Header Card [cite: 51, 139] */
        .profile-card {
            background: var(--color-emerald-deep);
            color: var(--color-white);
            padding: var(--space-8);
            border-radius: var(--radius-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--color-gold);
            margin-bottom: var(--space-10);
        }

        .profile-info h2 {
            font-family: var(--font-display);
        }

        .profile-info p {
            color: var(--color-gold-light);
            letter-spacing: 1px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--space-8);
        }

        /* Attendance Circular Widget [cite: 58, 162] */
        .stat-box {
            background: var(--color-white);
            padding: var(--space-8);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            text-align: center;
            border: 1px solid var(--color-cream-mid);
        }

        .attendance-circle {
            width: 120px;
            height: 120px;
            border: 8px solid var(--color-cream-dark);
            border-top: 8px solid var(--color-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-4);
            font-size: var(--fs-xl);
            font-weight: var(--fw-bold);
            color: var(--color-emerald);
        }

        /* Result Table [cite: 63, 163-167] */
        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: var(--space-4);
            text-align: left;
        }

        .result-table th,
        .result-table td {
            padding: var(--space-4);
            border-bottom: 1px solid var(--color-cream-mid);
        }

        .result-table th {
            color: var(--color-emerald);
            font-weight: var(--fw-bold);
        }

        .grade-badge {
            background: var(--color-emerald-mist);
            color: var(--color-emerald);
            padding: 4px 12px;
            border-radius: var(--radius-pill);
            font-weight: var(--fw-bold);
        }
    </style>
</head>

<body>

    <div class="dashboard-wrapper">
        <header class="profile-card">
            <div class="profile-info">
                <p>Welcome back,</p>
                <h2 id="studentName">Ahmed</h2>
                <span id="studentID">ID: S001</span>
            </div>
            <a href="../index.html" class="btn-portal" style="background: transparent;">Logout</a>
        </header>

        <div class="stats-grid">
            <section class="stat-box">
                <h3 class="section-label">Current Attendance</h3>
                <div class="attendance-circle">28/30</div>
                <p class="section-body" style="font-size: var(--fs-sm);">Keep it up! Your attendance is 93%.</p>
            </section>

            <section class="stat-box">
                <h3 class="section-label">Examination Results</h3>
                <table class="result-table">
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Marks</th>
                            <th>Grade</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Fiqh</td>
                            <td>85/100</td>
                            <td><span class="grade-badge">A</span></td>
                        </tr>
                        <tr>
                            <td>Hadith</td>
                            <td>78/100</td>
                            <td><span class="grade-badge">B+</span></td>
                        </tr>
                        <tr>
                            <td>Tafseer</td>
                            <td>90/100</td>
                            <td><span class="grade-badge">A+</span></td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </div>

</body>

</html>
